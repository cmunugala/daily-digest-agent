services:
  db:
    image: postgres:16
    container_name: daily_digest_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  streamlit:
    build: .
    command: streamlit run src/streamlit.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./src:/app/src
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
